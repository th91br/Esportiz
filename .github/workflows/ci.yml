name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: true
      VITE_SUPABASE_URL: https://ci.invalid.supabase.co
      VITE_SUPABASE_PUBLISHABLE_KEY: ci-public-test-key
    steps:
      - name: Check out repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.20.0
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Test production monitor contract
        run: npm run test:production-monitor

      - name: Test security header contract
        run: npm run test:security-headers

      - name: Test performance budget contract
        run: npm run test:performance-budget

      - name: Run regression gate
        run: npm run check:regression

  public-e2e:
    name: Public E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: true
      VITE_SUPABASE_URL: https://ci.invalid.supabase.co
      VITE_SUPABASE_PUBLISHABLE_KEY: ci-public-test-key
    steps:
      - name: Check out repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.20.0
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Install Chrome for Playwright
        run: npx playwright install --with-deps chrome

      - name: Run public journeys
        run: npm run test:e2e

      - name: Upload Playwright diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7
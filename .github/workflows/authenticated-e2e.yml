name: Authenticated E2E

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "41 3 * * *"

permissions:
  contents: read

concurrency:
  group: authenticated-e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  staging:
    name: Authenticated E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: staging
    env:
      CI: true
      VITE_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.STAGING_SUPABASE_PUBLISHABLE_KEY }}
      E2E_STAGING_EMAIL: ${{ secrets.E2E_STAGING_EMAIL }}
      E2E_STAGING_PASSWORD: ${{ secrets.E2E_STAGING_PASSWORD }}
      SUPABASE_STAGING_PROJECT_REF: ${{ secrets.SUPABASE_STAGING_PROJECT_REF }}
      E2E_FORBIDDEN_SUPABASE_PROJECT_REF: crwaerhlrzqzxqaijkqc
    steps:
      - name: Check out repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.20.0
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Validate staging isolation
        run: npm run check:staging-env

      - name: Test staging safety contract
        run: npm run test:staging-env

      - name: Install Chrome for Playwright
        run: npx playwright install --with-deps chrome

      - name: Run authenticated journeys against branch code
        run: npm run test:e2e:staging:local

      - name: Upload Playwright diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: authenticated-e2e-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7

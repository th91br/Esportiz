name: Database validation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  migrations:
    name: Database migrations
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.20.0

      - name: Verify migration history contract
        run: |
          npm run test:migrations
          npm run check:migrations

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@3c2f5e2ae34c34e428e8e206e2c4d21fa2d20fbf # v2.1.1
        with:
          version: 2.109.1

      - id: start-db
        name: Start disposable database
        run: supabase db start

      - name: Replay every migration from a clean database
        run: supabase db reset --local --no-seed

      - name: Lint local database
        run: supabase db lint --local --level error

      - name: Stop disposable database
        if: always() && steps.start-db.outcome == 'success'
        run: supabase stop --no-backup